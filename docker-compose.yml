services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  query:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.query
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      HF_API_TOKEN: "${HF_API_TOKEN}"
      HF_LLM_MODEL: "${HF_LLM_MODEL}"
      HF_LLM_MAX_NEW_TOKENS: "${HF_LLM_MAX_NEW_TOKENS:-1024}"
      MAX_CONTEXT_CHARS: "${MAX_CONTEXT_CHARS:-8000}"
      RETRIEVAL_SCORE_THRESHOLD: "${RETRIEVAL_SCORE_THRESHOLD:-0.5}"
    ports:
      - "8000:8000"
    mem_limit: 3g
    volumes:
      - ./hf_cache:/root/.cache/huggingface

  indexing:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.indexing
    profiles: ["indexing"]
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ./hf_cache:/root/.cache/huggingface

volumes:
  qdrant-storage:
    driver: local
